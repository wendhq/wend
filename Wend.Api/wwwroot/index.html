<!doctype html>
<html lang="en" data-theme="dark" data-palette="wend">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wend</title>

  <!-- Inline theme init BEFORE stylesheets — prevents a flash of light theme.
       Sets data-theme from a saved choice (defaults to dark). The palette is fixed
       to Wend's brand on <html> above; a palette switcher is a later slice. -->
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      document.documentElement.dataset.theme = saved || "dark";
    })();
  </script>

  <link rel="stylesheet" href="/design-system/tokens/index.css" />
  <link rel="stylesheet" href="/design-system/base/reset.css" />
  <link rel="stylesheet" href="/design-system/base/base.css" />
  <link rel="stylesheet" href="/design-system/primitives/index.css" />
  <link rel="stylesheet" href="/design-system/components/index.css" />
  <link rel="stylesheet" href="/design-system/compositions/index.css" />
  <link rel="stylesheet" href="/design-system/utilities/index.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <!-- First focusable element: lets keyboard / screen-reader users jump past the header
       straight to the boards. Hidden until focused; the design-system styles .skip-link. -->
  <a class="skip-link" href="#app">Skip to content</a>

  <header class="app-header">
    <h1>Wend</h1>
    <button type="button" id="settings-link">Settings</button>
  </header>

  <!-- Transient "Deleted · Undo" toast. Fixed at the bottom via the design-system .toast-region,
       but placed BEFORE #app in the DOM so its Undo button sits near the front of the tab order —
       one Shift+Tab back from the board heading. Outside #app so a re-render never wipes it. -->
  <div id="toast-region" class="toast-region"></div>

  <!-- tabindex="-1" so the skip link can move focus here (otherwise <main> isn't focusable).
       Task 9's view renders the boards UI into this container. -->
  <main id="app" tabindex="-1"></main>

  <!-- Screen-reader announcements (create/rename/delete now; move/undo later). Lives OUTSIDE
       #app so the view's re-render never wipes it. -->
  <div id="status" class="visually-hidden" role="status" aria-live="polite"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
